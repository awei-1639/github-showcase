name: Update GitHub Resources

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-resources:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run update script
        run: npx tsx scripts/update-resources.ts

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit_message: 'chore: update resources'
          branch: chore/update-resources-$(date +%Y-%m-%d)
          title: 'chore: update resources $(date +%Y-%m-%d)'
          labels: |
            automated
            resources-update
          delete-branch: true